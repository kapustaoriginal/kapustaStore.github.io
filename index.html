<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kapusta Store</title>
    <link rel="icon" type="image/png" href="Icons/kapustaStoreIcon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { slate: { 850: '#1e293b' } }
                }
            }
        }
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        .glass-panel { backdrop-filter: blur(12px); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-input {
            width: 100%; border: 1px solid #e2e8f0; padding: 0.75rem; border-radius: 0.75rem;
            background-color: #f8fafc; outline: none; transition: all 0.2s;
        }
        .dark .form-input { background-color: #334155; border-color: #475569; color: white; }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .spinning { animation: spin 1s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .desc-container { position: relative; overflow: hidden; transition: max-height 0.3s ease-in-out; }
        .desc-truncated { display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .desc-expanded { display: block; -webkit-line-clamp: unset; line-clamp: unset; }

        #downloadDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #drawerOverlay { transition: opacity 0.4s ease; }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="sticky top-0 z-40 w-full glass-panel bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 shadow-sm transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="rounded-lg shadow-lg shadow-green-500/30 flex items-center justify-center">
                    <img src="Icons/kapustaStoreIcon.ico" alt="kapusta Store Logo" class="w-8 h-8 object-contain">
                </div>
                <span class="font-bold text-xl tracking-tight">kapusta Store</span>
            </div>

            <div class="flex items-center gap-2 sm:gap-3">
                <button onclick="refreshData()" class="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition" title="Обновить список">
                    <i data-lucide="refresh-cw" class="w-5 h-5" id="refreshIcon"></i>
                </button>

                <button onclick="toggleTheme()" class="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition">
                    <i data-lucide="moon" class="hidden dark:block w-5 h-5"></i>
                    <i data-lucide="sun" class="block dark:hidden w-5 h-5"></i>
                </button>

                <a href="AdminPanelkapustaStore.html" class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 transition px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
                    <i data-lucide="lock" class="w-4 h-4"></i> <span class="hidden sm:inline">Admin</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div class="mb-8 relative max-w-2xl mx-auto">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Поиск приложений..." class="form-input pl-12 py-4 shadow-sm text-base">
        </div>

        <div id="appsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        <div id="emptyState" class="hidden text-center py-20 fade-in">
            <i data-lucide="ghost" class="w-10 h-10 text-slate-400 mx-auto mb-4"></i>
            <p class="text-slate-500">Ничего не найдено.</p>
        </div>
    </main>

    <div id="drawerOverlay" onclick="closeDrawer()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[50] hidden opacity-0 transition-opacity"></div>
    <div id="downloadDrawer" class="fixed top-0 right-0 h-full w-full max-w-sm bg-white dark:bg-slate-900 z-[60] shadow-2xl translate-x-full overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-xl font-bold">Загрузка</h3>
                <button onclick="closeDrawer()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="drawerAppInfo" class="flex items-center gap-4 mb-8"></div>
            <div class="space-y-4">
                <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Доступные версии</h4>
                <div id="versionsList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none">
        <div class="bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
            <i id="toastIcon" data-lucide="check-circle"></i>
            <span id="toastMsg" class="font-medium text-sm"></span>
        </div>
    </div>

    <script>
        const ENCRYPTION_KEY = "EncryptKeynsi-gudj2766CJS#@=jvn*&@#82650jvUVSOKAZQ"; 
        const GIST_FILENAME = "DataAppsListForkapustaStore.json";
        const DEFAULT_GIST_ID = "e8e01c6caf664c7e44fdc4635412348f"; 

        let apps = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            loadCachedApps();
            await refreshData(true);
            lucide.createIcons();
        });

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const icon = document.getElementById('toastIcon');
            if(!toast || !toastMsg) return;

            toastMsg.innerText = msg;
            icon.setAttribute('data-lucide', isError ? 'alert-circle' : 'check-circle');
            icon.className = isError ? 'text-red-400' : 'text-green-400';
            
            lucide.createIcons();
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = apps.filter(app => 
                app.title.toLowerCase().includes(query) || 
                app.category.toLowerCase().includes(query)
            );
            renderApps(filtered);
        }

        function loadCachedApps() {
            const cached = localStorage.getItem('secure_apps_cache');
            if (!cached) return;
            try {
                const bytes = CryptoJS.AES.decrypt(cached, ENCRYPTION_KEY);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if(decrypted) {
                    apps = JSON.parse(decrypted);
                    renderApps();
                }
            } catch (e) { console.error("Cache decrypt error", e); }
        }

        async function refreshData(isSilent = false) {
            const cleanGistId = DEFAULT_GIST_ID.split('/').pop();
            const icon = document.getElementById('refreshIcon');
            
            if (!cleanGistId) return;
            if(!isSilent && icon) icon.classList.add('spinning');
            
            try {
                const res = await fetch(`https://api.github.com/gists/${cleanGistId}`);
                if (!res.ok) throw new Error("Fetch failed");
                
                const data = await res.json();
                const file = data.files[GIST_FILENAME];
                
                if (file && file.content) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(file.content, ENCRYPTION_KEY);
                        const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                        apps = decrypted ? JSON.parse(decrypted) : [];
                    } catch(e) { apps = []; }
                }
                
                const ciphertext = CryptoJS.AES.encrypt(JSON.stringify(apps), ENCRYPTION_KEY).toString();
                localStorage.setItem('secure_apps_cache', ciphertext);
                
                renderApps();
                if(!isSilent) showToast("Данные обновлены");
            } catch (err) {
                if(!isSilent) showToast("Ошибка синхронизации", true);
            } finally {
                if(icon) icon.classList.remove('spinning');
            }
        }

        function toggleDesc(id) {
            const p = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btn-desc-${id}`);
            if(!p || !btn) return;

            if(p.classList.contains('desc-truncated')) {
                p.classList.remove('desc-truncated');
                p.classList.add('desc-expanded');
                btn.innerText = "Свернуть";
            } else {
                p.classList.remove('desc-expanded');
                p.classList.add('desc-truncated');
                btn.innerText = "Подробнее";
            }
        }

        function openDownloadDrawer(id) {
            const app = apps.find(a => a.id === id);
            if(!app) return;

            const drawer = document.getElementById('downloadDrawer');
            const overlay = document.getElementById('drawerOverlay');
            const info = document.getElementById('drawerAppInfo');
            const list = document.getElementById('versionsList');

            info.innerHTML = `
                <img src="${app.image}" class="w-16 h-16 rounded-2xl object-cover shadow-sm bg-slate-100 dark:bg-slate-800">
                <div>
                    <h4 class="font-bold text-lg leading-tight">${app.title}</h4>
                    <p class="text-xs text-slate-500 uppercase tracking-wide mt-1">${app.category}</p>
                </div>
            `;

            let versionsHTML = `
                <button onclick="window.open('${app.downloadUrl}', '_blank')" class="w-full flex items-center justify-between p-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-500/20 active:scale-95 transition">
                    <span class="flex items-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4 text-blue-200"></i>
                        Текущая версия
                    </span>
                    <i data-lucide="download" class="w-4 h-4"></i>
                </button>
            `;

            if(app.versions) {
                const lines = app.versions.split('\n');
                lines.forEach(line => {
                    if(!line.trim()) return;
                    const parts = line.split('|');
                    const vName = parts[0]?.trim() || "Версия";
                    const vUrl = parts[1]?.trim() || "#";
                    
                    versionsHTML += `
                        <button onclick="window.open('${vUrl}', '_blank')" class="w-full flex items-center justify-between p-4 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-2xl font-bold active:scale-95 transition">
                            <span class="text-slate-600 dark:text-slate-300">${vName}</span>
                            <i data-lucide="download" class="w-4 h-4 text-slate-400"></i>
                        </button>
                    `;
                });
            }

            list.innerHTML = versionsHTML;
            lucide.createIcons();

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('opacity-100');
                drawer.classList.remove('translate-x-full');
            }, 10);
            
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            const drawer = document.getElementById('downloadDrawer');
            const overlay = document.getElementById('drawerOverlay');
            
            drawer.classList.add('translate-x-full');
            overlay.classList.remove('opacity-100');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }, 400);
        }

        function renderApps(dataToRender = apps) {
            const grid = document.getElementById('appsGrid');
            const empty = document.getElementById('emptyState');
            if(!grid) return;
            
            grid.innerHTML = '';
            if (dataToRender.length === 0) { 
                empty.classList.remove('hidden'); 
                return; 
            }
            
            empty.classList.add('hidden');
            dataToRender.forEach(app => {
                const card = document.createElement('div');
                card.className = "relative bg-white dark:bg-slate-800 rounded-3xl p-5 shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col h-full fade-in";
                
                card.innerHTML = `
                    <div class="mb-4">
                        <img src="${app.image}" class="w-20 h-20 rounded-[2rem] object-cover shadow-md bg-slate-100 dark:bg-slate-700" onerror="this.src='https://ui-avatars.com/api/?name=Error'">
                    </div>
                    <div class="pr-10">
                        <h3 class="font-bold text-lg dark:text-white break-words leading-tight">${app.title}</h3>
                    </div>
                    <div class="flex items-center justify-between mt-1 mb-3">
                         <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">${app.category}</p>
                         <span class="text-xs font-black ${app.price === 'Бесплатно' ? 'text-green-500' : 'text-blue-500'}">${app.price}</span>
                    </div>
                    
                    <div class="flex-grow flex flex-col mb-4">
                        <p id="desc-${app.id}" class="text-sm text-slate-500 dark:text-slate-400 desc-truncated leading-relaxed">${app.desc || 'Нет описания для этого приложения.'}</p>
                        <button id="btn-desc-${app.id}" onclick="toggleDesc(${app.id})" class="text-blue-600 dark:text-blue-400 text-xs font-bold text-left mt-1 hover:underline opacity-0 pointer-events-none transition-opacity">Подробнее</button>
                    </div>

                    <button onclick="openDownloadDrawer(${app.id})" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-3 rounded-2xl font-bold transition-all hover:shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        Скачать
                    </button>
                `;
                grid.appendChild(card);

                setTimeout(() => {
                    const descEl = document.getElementById(`desc-${app.id}`);
                    const btnEl = document.getElementById(`btn-desc-${app.id}`);
                    if(descEl && descEl.scrollHeight > descEl.clientHeight) {
                        btnEl.classList.remove('opacity-0', 'pointer-events-none');
                    }
                }, 50);
            });
            
            lucide.createIcons();
        }
    </script>
</body>
</html>
